<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameVerse - Arcade Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="stars"></div>

    <div id="app">
        <div id="home-page" class="page active">
            <header>
                <div class="logo-container">
                    <h1 class="site-title">GAME<span>VERSE</span></h1>
                    <p class="subtitle">ARCADE HUB</p>
                    <div class="divider">
                        <span class="divider-line"></span>
                        <i class="fas fa-joystick"></i>
                        <span class="divider-line"></span>
                    </div>
                </div>
                <div class="search-container">
                    <i class="fas fa-search search-icon"></i>
                    <input type="text" id="search-input" placeholder="Cerca un gioco..." autocomplete="off">
                </div>
            </header>

            <main>
                <div id="game-grid"></div>
            </main>

            <footer>
                <p>GameVerse &copy; 2026 &mdash; Premi <kbd>ESC</kbd> per tornare alla home</p>
            </footer>
        </div>

        <div id="game-page" class="page">
            <div id="game-bar">
                <button id="back-btn" title="Torna alla home">
                    <i class="fas fa-arrow-left"></i>
                    <span>Indietro</span>
                </button>
                <span id="game-title-display">Gioco</span>
            </div>
            <div id="game-container">
                <div id="game-loader">
                    <div class="loader-ring"></div>
                    <p>Caricamento in corso...</p>
                </div>
                <iframe id="game-iframe" src="" frameborder="0" allowfullscreen></iframe>
            </div>
        </div>
    </div>

    <script id="game-manifest-data" type="application/json">[
  { "id": "breakout", "title": "Breakout", "desc": "Rompi tutti i mattoni con la pallina!" },
  { "id": "snake", "title": "Snake", "desc": "Il classico serpente mangia-mele" }
]</script>
    <script src="js/main.js"></script>
</body>
</html>
