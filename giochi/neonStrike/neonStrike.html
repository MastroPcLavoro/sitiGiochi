<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEON STRIKE — Retro Arcade SHMUP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #050515;
    --cyan: #00f3ff;
    --magenta: #ff00ff;
    --green: #00ff66;
    --yellow: #ffff00;
    --red: #ff2266;
    --orange: #ff6b00;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    background: #000;
    color: var(--cyan);
    font-family: 'Orbitron', sans-serif;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    background:
      radial-gradient(ellipse at 30% 0%, rgba(120, 0, 180, 0.25) 0%, transparent 50%),
      radial-gradient(ellipse at 70% 100%, rgba(0, 80, 180, 0.2) 0%, transparent 50%),
      #050515;
  }
  #gameContainer {
    position: relative;
    height: 96vh;
    aspect-ratio: 540 / 720;
    max-width: 96vw;
    box-shadow:
      0 0 60px rgba(0, 243, 255, 0.35),
      0 0 120px rgba(255, 0, 255, 0.25),
      inset 0 0 1px rgba(0, 243, 255, 0.6);
    border: 2px solid rgba(0, 243, 255, 0.5);
    border-radius: 8px;
    overflow: hidden;
    background: var(--bg);
  }
  #gameCanvas {
    display: block;
    width: 100%;
    height: 100%;
  }

  /* ===== HUD ===== */
  .hud {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 10;
    font-family: 'Orbitron', sans-serif;
    color: var(--cyan);
  }
  .hud-top {
    position: absolute;
    top: 14px; left: 14px; right: 14px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
  }
  .hud-block {
    background: rgba(5, 5, 21, 0.55);
    border: 1px solid rgba(0, 243, 255, 0.35);
    padding: 6px 10px;
    border-radius: 4px;
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    min-width: 90px;
  }
  .hud-label {
    font-size: 9px;
    letter-spacing: 2px;
    opacity: 0.7;
    color: var(--cyan);
    text-transform: uppercase;
  }
  .hud-value {
    font-size: 20px;
    font-weight: 700;
    color: var(--yellow);
    text-shadow: 0 0 8px var(--yellow);
    line-height: 1.1;
  }
  .hud-value.score { color: var(--cyan); text-shadow: 0 0 10px var(--cyan); }
  .hud-value.wave  { color: var(--magenta); text-shadow: 0 0 10px var(--magenta); }
  .hud-value.hi    { font-size: 14px; color: #c0e8ff; text-shadow: 0 0 6px var(--cyan); }

  .lives {
    display: flex;
    gap: 5px;
    margin-top: 4px;
    justify-content: flex-end;
  }
  .life-icon {
    width: 16px;
    height: 16px;
    background: var(--cyan);
    clip-path: polygon(50% 0, 100% 100%, 50% 78%, 0 100%);
    filter: drop-shadow(0 0 4px var(--cyan));
  }

  .combo {
    position: absolute;
    top: 100px;
    right: 14px;
    text-align: right;
    opacity: 0;
    transition: opacity 0.3s, transform 0.3s;
    transform: scale(0.8);
  }
  .combo.active { opacity: 1; transform: scale(1); }
  .combo-label {
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--magenta);
    text-shadow: 0 0 6px var(--magenta);
  }
  .combo-value {
    font-size: 36px;
    font-weight: 900;
    color: var(--yellow);
    text-shadow: 0 0 14px var(--yellow), 0 0 28px var(--orange);
    line-height: 1;
  }

  .weapon-indicator {
    position: absolute;
    bottom: 14px;
    left: 14px;
    background: rgba(5, 5, 21, 0.55);
    border: 1px solid rgba(0, 243, 255, 0.35);
    padding: 6px 10px;
    border-radius: 4px;
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .weapon-indicator.active { opacity: 1; }
  .weapon-indicator .hud-label { font-size: 9px; }
  .weapon-indicator .weapon-name {
    font-size: 13px;
    font-weight: 700;
    color: var(--green);
    text-shadow: 0 0 8px var(--green);
    letter-spacing: 2px;
  }
  .weapon-bar {
    width: 80px;
    height: 3px;
    background: rgba(0, 255, 102, 0.2);
    margin-top: 4px;
    overflow: hidden;
    border-radius: 2px;
  }
  .weapon-bar-fill {
    height: 100%;
    background: var(--green);
    box-shadow: 0 0 6px var(--green);
    transition: width 0.1s linear;
  }

  /* ===== SCREENS ===== */
  .screen {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 30px;
    z-index: 20;
    background: radial-gradient(ellipse at center, rgba(5, 5, 21, 0.82) 0%, rgba(5, 5, 21, 0.96) 100%);
    backdrop-filter: blur(3px);
    -webkit-backdrop-filter: blur(3px);
    transition: opacity 0.4s;
  }
  .screen.hidden {
    opacity: 0;
    pointer-events: none;
  }

  .title {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(26px, 5vw, 46px);
    color: var(--cyan);
    letter-spacing: 4px;
    text-align: center;
    margin-bottom: 10px;
    animation: titlePulse 2.4s ease-in-out infinite;
    line-height: 1.2;
  }
  @keyframes titlePulse {
    0%, 100% {
      text-shadow:
        0 0 8px var(--cyan),
        0 0 20px var(--cyan),
        0 0 40px var(--magenta),
        4px 4px 0 rgba(255, 0, 255, 0.5);
    }
    50% {
      text-shadow:
        0 0 14px var(--cyan),
        0 0 32px var(--cyan),
        0 0 60px var(--magenta),
        4px 4px 0 rgba(255, 0, 255, 0.7);
    }
  }
  .subtitle {
    font-family: 'Orbitron', sans-serif;
    font-size: 13px;
    color: var(--magenta);
    letter-spacing: 8px;
    margin-bottom: 28px;
    text-shadow: 0 0 8px var(--magenta);
  }

  .instructions {
    background: rgba(0, 243, 255, 0.04);
    border: 1px solid rgba(0, 243, 255, 0.25);
    border-radius: 6px;
    padding: 16px 22px;
    margin-bottom: 28px;
    text-align: center;
    max-width: 380px;
  }
  .instructions h3 {
    font-size: 11px;
    color: var(--cyan);
    letter-spacing: 3px;
    margin-bottom: 14px;
    font-weight: 700;
  }
  .instructions p {
    font-size: 13px;
    color: #b0d8e8;
    margin: 8px 0;
    line-height: 1.5;
  }
  .key {
    display: inline-block;
    padding: 3px 9px;
    background: rgba(0, 243, 255, 0.12);
    border: 1px solid var(--cyan);
    border-radius: 3px;
    color: var(--cyan);
    font-family: 'Press Start 2P', monospace;
    font-size: 10px;
    margin: 0 2px;
    box-shadow: 0 0 6px rgba(0, 243, 255, 0.4);
  }
  .accent-green { color: var(--green); font-weight: 700; text-shadow: 0 0 6px var(--green); }

  .btn {
    font-family: 'Press Start 2P', monospace;
    font-size: 15px;
    color: var(--cyan);
    background: transparent;
    border: 2px solid var(--cyan);
    padding: 16px 38px;
    cursor: pointer;
    letter-spacing: 4px;
    text-shadow: 0 0 8px var(--cyan);
    box-shadow:
      0 0 20px rgba(0, 243, 255, 0.5),
      inset 0 0 20px rgba(0, 243, 255, 0.08);
    transition: all 0.2s;
    pointer-events: auto;
    position: relative;
    overflow: hidden;
  }
  .btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent, rgba(0, 243, 255, 0.4), transparent);
    transform: translateX(-100%);
    transition: transform 0.5s;
  }
  .btn:hover {
    background: rgba(0, 243, 255, 0.12);
    box-shadow:
      0 0 30px rgba(0, 243, 255, 0.9),
      inset 0 0 30px rgba(0, 243, 255, 0.2);
    transform: scale(1.05);
  }
  .btn:hover::before { transform: translateX(100%); }
  .btn:active { transform: scale(0.98); }

  .stats {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin: 24px 0;
    text-align: center;
    min-width: 260px;
  }
  .stat-row {
    display: flex;
    justify-content: space-between;
    gap: 30px;
    font-size: 13px;
    color: #b0d8e8;
    letter-spacing: 2px;
    padding: 6px 14px;
    border-bottom: 1px solid rgba(0, 243, 255, 0.2);
  }
  .stat-row .val {
    color: var(--yellow);
    font-weight: 700;
    text-shadow: 0 0 8px var(--yellow);
  }
  .new-record {
    color: var(--green);
    text-shadow: 0 0 10px var(--green);
    animation: blink 0.6s infinite;
    font-weight: 900;
    letter-spacing: 3px;
    font-size: 14px;
  }
  @keyframes blink { 50% { opacity: 0.3; } }

  .game-over-title {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(22px, 4vw, 36px);
    color: var(--red);
    text-shadow: 0 0 12px var(--red), 0 0 30px var(--red);
    letter-spacing: 5px;
    margin-bottom: 10px;
    animation: redPulse 1.6s ease-in-out infinite;
  }
  @keyframes redPulse {
    0%, 100% { text-shadow: 0 0 12px var(--red), 0 0 30px var(--red); }
    50% { text-shadow: 0 0 20px var(--red), 0 0 50px var(--red); }
  }

  .pause-screen { background: rgba(5, 5, 21, 0.72); }
  .pause-title {
    font-family: 'Press Start 2P', monospace;
    font-size: 38px;
    color: var(--yellow);
    text-shadow: 0 0 18px var(--yellow), 0 0 36px var(--orange);
    letter-spacing: 8px;
    animation: pauseGlow 1.5s ease-in-out infinite;
  }
  @keyframes pauseGlow {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
  }
  .pause-hint {
    font-size: 12px;
    color: #b0d8e8;
    margin-top: 24px;
    letter-spacing: 2px;
  }

  .hi-display {
    margin-top: 24px;
    font-size: 11px;
    color: #7090a0;
    letter-spacing: 3px;
  }
  .hi-display span { color: var(--yellow); text-shadow: 0 0 6px var(--yellow); }

  @media (max-aspect-ratio: 540/720) {
    #gameContainer { width: 96vw; height: auto; }
  }
</style>
</head>
<body>
<div id="gameContainer">
  <canvas id="gameCanvas" width="540" height="720"></canvas>

  <!-- HUD -->
  <div class="hud" id="hud" style="display:none;">
    <div class="hud-top">
      <div>
        <div class="hud-block">
          <div class="hud-label">SCORE</div>
          <div class="hud-value score" id="scoreVal">0</div>
        </div>
        <div class="hud-block" style="margin-top:8px;">
          <div class="hud-label">WAVE</div>
          <div class="hud-value wave" id="waveVal">1</div>
        </div>
      </div>
      <div style="text-align:right;">
        <div class="hud-block">
          <div class="hud-label">LIVES</div>
          <div class="lives" id="livesDisplay"></div>
        </div>
        <div class="hud-block" style="margin-top:8px;">
          <div class="hud-label">HI-SCORE</div>
          <div class="hud-value hi" id="hiScoreVal">0</div>
        </div>
      </div>
    </div>
    <div class="combo" id="combo">
      <div class="combo-label">COMBO</div>
      <div class="combo-value" id="comboVal">x2</div>
    </div>
    <div class="weapon-indicator" id="weaponIndicator">
      <div class="hud-label">WEAPON</div>
      <div class="weapon-name" id="weaponName">SINGLE</div>
      <div class="weapon-bar"><div class="weapon-bar-fill" id="weaponBarFill"></div></div>
    </div>
  </div>

  <!-- Menu Screen -->
  <div class="screen" id="menuScreen">
    <h1 class="title">NEON<br>STRIKE</h1>
    <div class="subtitle">RETRO ARCADE SHOOTER</div>
    <div class="instructions">
      <h3>CONTROLLI</h3>
      <p><span class="key">←</span> <span class="key">→</span> &nbsp; Movimento laterale</p>
      <p>Sparo <span class="accent-green">AUTOMATICO</span></p>
      <p><span class="key">P</span> o <span class="key">ESC</span> &nbsp; Pausa</p>
    </div>
    <button class="btn" id="playBtn">GIOCA</button>
    <div class="hi-display">HI-SCORE: <span id="menuHiScore">0</span></div>
  </div>

  <!-- Pause Screen -->
  <div class="screen pause-screen hidden" id="pauseScreen">
    <div class="pause-title">PAUSA</div>
    <div class="pause-hint">Premi <span class="key">P</span> o <span class="key">ESC</span> per riprendere</div>
  </div>

  <!-- Game Over Screen -->
  <div class="screen hidden" id="gameOverScreen">
    <h1 class="game-over-title">GAME OVER</h1>
    <div class="stats">
      <div class="stat-row"><span>PUNTEGGIO</span><span class="val" id="finalScore">0</span></div>
      <div class="stat-row"><span>RECORD</span><span class="val" id="recordScore">0</span></div>
      <div class="stat-row" id="newRecordRow" style="display:none; border:none;"><span></span><span class="new-record">NEW RECORD!</span></div>
      <div class="stat-row"><span>ONDATA</span><span class="val" id="finalWave">1</span></div>
    </div>
    <button class="btn" id="replayBtn">RIGIOCA</button>
  </div>
</div>

<script>
'use strict';

// ============================================================
// COSTANTI & STATO
// ============================================================
const W = 540, H = 720;
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const STATES = { MENU: 'menu', PLAYING: 'playing', PAUSED: 'paused', GAMEOVER: 'gameover' };
let state = STATES.MENU;
let lastTime = 0;
let shake = 0;
let flash = 0;
let flashColor = '255, 0, 0';

// Entities
let player = null;
let bullets = [];
let enemies = [];
let asteroids = [];
let powerups = [];
let particles = [];
let stars = [];
let floaters = [];

// Stats
let score = 0;
let highScore = parseInt(localStorage.getItem('neonStrike_highScore') || '0');
let lives = 3;
let wave = 1;
let waveKills = 0;
let waveTarget = 8;
let spawnTimer = 0;
let spawnRate = 1500;
let pendingSpawns = 0;
let spawnDelay = 0;
let combo = 0;
let comboTimer = 0;

// Announcements (wave intro)
let announcement = null;
let announcementTime = 0;

// Game over delay
let gameOverPending = false;
let gameOverTimer = 0;

// Input
const keys = {};

// ============================================================
// AUDIO MANAGER (Web Audio API procedurale)
// ============================================================
class AudioManager {
  constructor() {
    this.ctx = null;
    this.master = null;
    this.muted = false;
  }
  init() {
    if (this.ctx) return;
    try {
      this.ctx = new (window.AudioContext || window.webkitAudioContext)();
      this.master = this.ctx.createGain();
      this.master.gain.value = 0.22;
      this.master.connect(this.ctx.destination);
    } catch(e) { console.warn('Audio init failed', e); }
  }
  resume() {
    if (this.ctx && this.ctx.state === 'suspended') this.ctx.resume();
  }

  laser() {
    if (!this.ctx || this.muted) return;
    const t = this.ctx.currentTime;
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(1400, t);
    osc.frequency.exponentialRampToValueAtTime(180, t + 0.12);
    gain.gain.setValueAtTime(0.16, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
    osc.connect(gain); gain.connect(this.master);
    osc.start(t); osc.stop(t + 0.13);
  }

  explosion(big = false) {
    if (!this.ctx || this.muted) return;
    const t = this.ctx.currentTime;
    const dur = big ? 0.55 : 0.3;
    const bufferSize = Math.floor(this.ctx.sampleRate * dur);
    const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) {
      data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i/bufferSize, 1.4);
    }
    const noise = this.ctx.createBufferSource();
    noise.buffer = buffer;
    const filter = this.ctx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.setValueAtTime(big ? 1400 : 900, t);
    filter.frequency.exponentialRampToValueAtTime(60, t + dur);
    const gain = this.ctx.createGain();
    gain.gain.setValueAtTime(big ? 0.6 : 0.38, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + dur);
    noise.connect(filter); filter.connect(gain); gain.connect(this.master);
    noise.start(t);
  }

  powerup() {
    if (!this.ctx || this.muted) return;
    const t = this.ctx.currentTime;
    [0, 0.08, 0.16].forEach((d, i) => {
      const osc = this.ctx.createOscillator();
      const gain = this.ctx.createGain();
      osc.type = 'square';
      osc.frequency.setValueAtTime(440 * Math.pow(1.5, i), t + d);
      gain.gain.setValueAtTime(0.14, t + d);
      gain.gain.exponentialRampToValueAtTime(0.001, t + d + 0.12);
      osc.connect(gain); gain.connect(this.master);
      osc.start(t + d); osc.stop(t + d + 0.12);
    });
  }

  damage() {
    if (!this.ctx || this.muted) return;
    const t = this.ctx.currentTime;
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(180, t);
    osc.frequency.exponentialRampToValueAtTime(40, t + 0.45);
    gain.gain.setValueAtTime(0.32, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.45);
    osc.connect(gain); gain.connect(this.master);
    osc.start(t); osc.stop(t + 0.45);
  }

  waveStart() {
    if (!this.ctx || this.muted) return;
    const t = this.ctx.currentTime;
    [392, 523, 659, 784].forEach((f, i) => {
      const osc = this.ctx.createOscillator();
      const gain = this.ctx.createGain();
      osc.type = 'square';
      osc.frequency.setValueAtTime(f, t + i * 0.08);
      gain.gain.setValueAtTime(0.14, t + i * 0.08);
      gain.gain.exponentialRampToValueAtTime(0.001, t + i * 0.08 + 0.18);
      osc.connect(gain); gain.connect(this.master);
      osc.start(t + i * 0.08); osc.stop(t + i * 0.08 + 0.2);
    });
  }
}
const audio = new AudioManager();

// ============================================================
// UTILITY
// ============================================================
const rand = (a, b) => Math.random() * (b - a) + a;
const randInt = (a, b) => Math.floor(rand(a, b + 1));
const clamp = (v, mn, mx) => Math.max(mn, Math.min(mx, v));
const aabb = (a, b) => a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
function hexToRgb(hex) {
  return parseInt(hex.slice(1,3),16) + ',' + parseInt(hex.slice(3,5),16) + ',' + parseInt(hex.slice(5,7),16);
}

// ============================================================
// SFONDO: STELLE + GRIGLIA SINTHWAVE
// ============================================================
function initStars() {
  stars = [];
  for (let i = 0; i < 140; i++) {
    stars.push({
      x: Math.random() * W,
      y: Math.random() * H,
      size: Math.random() * 1.6 + 0.3,
      speed: Math.random() * 1.8 + 0.4,
      brightness: Math.random() * 0.7 + 0.3,
      color: Math.random() > 0.85 ? '#ff66ff' : (Math.random() > 0.7 ? '#88f3ff' : '#ffffff')
    });
  }
}
function updateStars(dt) {
  for (const s of stars) {
    s.y += s.speed * dt * 60;
    if (s.y > H) { s.y = -2; s.x = Math.random() * W; }
  }
}
function drawStars() {
  for (const s of stars) {
    ctx.globalAlpha = s.brightness;
    ctx.fillStyle = s.color;
    ctx.fillRect(s.x, s.y, s.size, s.size);
  }
  ctx.globalAlpha = 1;
}

let gridOffset = 0;
function updateGrid(dt) {
  gridOffset = (gridOffset + dt * 60 * 0.012) % 1;
}

function drawBackground() {
  const horizon = H * 0.28;

  // Glow all'orizzonte
  const horizonGrad = ctx.createLinearGradient(0, horizon - 60, 0, horizon + 80);
  horizonGrad.addColorStop(0, 'rgba(255, 0, 100, 0)');
  horizonGrad.addColorStop(0.5, 'rgba(255, 0, 150, 0.25)');
  horizonGrad.addColorStop(1, 'rgba(120, 0, 200, 0)');
  ctx.fillStyle = horizonGrad;
  ctx.fillRect(0, horizon - 60, W, 140);

  // Sole synthwave con scanline
  const sunX = W / 2;
  const sunY = horizon - 6;
  const sunR = 38;

  ctx.save();
  ctx.beginPath();
  ctx.arc(sunX, sunY, sunR, 0, Math.PI * 2);
  ctx.clip();
  const sunGrad = ctx.createLinearGradient(sunX, sunY - sunR, sunX, sunY + sunR);
  sunGrad.addColorStop(0, '#ffee66');
  sunGrad.addColorStop(0.4, '#ff66cc');
  sunGrad.addColorStop(1, '#cc0066');
  ctx.fillStyle = sunGrad;
  ctx.fillRect(sunX - sunR, sunY - sunR, sunR * 2, sunR * 2);
  // Scanlines
  ctx.fillStyle = 'rgba(5, 5, 21, 0.85)';
  for (let i = 0; i < 7; i++) {
    const y = sunY - sunR + 8 + i * 8;
    ctx.fillRect(sunX - sunR, y, sunR * 2, 2 + i * 0.4);
  }
  ctx.restore();

  // Glow esterno del sole
  const glow = ctx.createRadialGradient(sunX, sunY, 0, sunX, sunY, sunR * 2.5);
  glow.addColorStop(0, 'rgba(255, 100, 200, 0.4)');
  glow.addColorStop(0.5, 'rgba(255, 0, 100, 0.15)');
  glow.addColorStop(1, 'rgba(255, 0, 100, 0)');
  ctx.fillStyle = glow;
  ctx.fillRect(sunX - sunR * 3, sunY - sunR * 3, sunR * 6, sunR * 6);

  // GRIGLIA PROSPETTICA
  const vpX = W / 2;
  // Linee verticali divergenti verso il basso
  ctx.strokeStyle = 'rgba(255, 0, 200, 0.35)';
  ctx.lineWidth = 1;
  for (let i = -10; i <= 10; i++) {
    const xBottom = vpX + i * 60;
    ctx.beginPath();
    ctx.moveTo(xBottom, H);
    ctx.lineTo(vpX + i * 4, horizon);
    ctx.stroke();
  }
  // Linee orizzontali animate verso il basso
  ctx.strokeStyle = 'rgba(0, 243, 255, 0.4)';
  ctx.lineWidth = 1;
  const numLines = 22;
  for (let i = 0; i < numLines; i++) {
    const t = ((i / numLines) + gridOffset) % 1;
    const y = horizon + Math.pow(t, 2.3) * (H - horizon);
    const widthFactor = Math.pow(t, 1.1);
    const w = widthFactor * W * 0.55;
    ctx.globalAlpha = clamp(t * 1.6, 0, 0.9);
    ctx.beginPath();
    ctx.moveTo(vpX - w, y);
    ctx.lineTo(vpX + w, y);
    ctx.stroke();
  }
  ctx.globalAlpha = 1;
}

// ============================================================
// PLAYER
// ============================================================
class Player {
  constructor() {
    this.x = W / 2;
    this.y = H - 90;
    this.w = 30;
    this.h = 38;
    this.speed = 6.2;
    this.fireRate = 200;
    this.lastShot = 0;
    this.weapon = 'single';
    this.weaponTime = 0;
    this.weaponDuration = 0;
    this.shield = 0;
    this.invuln = 0;
    this.thrust = 0;
    this.engineT = 0;
  }

  update(dt, t) {
    let dx = 0;
    if (keys['ArrowLeft'] || keys['a'] || keys['A']) dx -= 1;
    if (keys['ArrowRight'] || keys['d'] || keys['D']) dx += 1;
    this.x += dx * this.speed * dt * 60;
    this.x = clamp(this.x, this.w / 2 + 6, W - this.w / 2 - 6);
    this.thrust = dx;

    if (t - this.lastShot > this.fireRate) {
      this.shoot();
      this.lastShot = t;
    }

    if (this.weaponTime > 0) {
      this.weaponTime -= dt * 1000;
      if (this.weaponTime <= 0) {
        this.weapon = 'single';
        this.fireRate = 200;
      }
    }
    if (this.invuln > 0) this.invuln -= dt * 1000;
    if (this.shield > 0) this.shield -= dt * 1000;

    // Scia motori
    this.engineT += dt;
    if (this.engineT > 0.02) {
      this.engineT = 0;
      for (let i = 0; i < 2; i++) {
        particles.push(new Particle(
          this.x + (i === 0 ? -6 : 6) + rand(-2, 2),
          this.y + this.h / 2 - 2,
          rand(-0.4, 0.4),
          rand(2.5, 4.5),
          Math.random() > 0.5 ? '#00f3ff' : '#00ff66',
          22, 2.5
        ));
      }
    }
  }

  shoot() {
    const bx = this.x;
    const by = this.y - this.h / 2;
    if (this.weapon === 'single') {
      bullets.push(new Bullet(bx, by, 0, -10, '#00ff66'));
    } else if (this.weapon === 'double') {
      bullets.push(new Bullet(bx - 9, by, 0, -10, '#00ff66'));
      bullets.push(new Bullet(bx + 9, by, 0, -10, '#00ff66'));
    } else if (this.weapon === 'triple') {
      bullets.push(new Bullet(bx, by, 0, -10.5, '#00f3ff'));
      bullets.push(new Bullet(bx - 4, by, -1.6, -10, '#00f3ff'));
      bullets.push(new Bullet(bx + 4, by, 1.6, -10, '#00f3ff'));
    } else if (this.weapon === 'rapid') {
      bullets.push(new Bullet(bx - 3, by, 0, -13, '#ffff00'));
      bullets.push(new Bullet(bx + 3, by, 0, -13, '#ffff00'));
    }
    audio.laser();
  }

  takeDamage() {
    if (this.invuln > 0) return false;
    if (this.shield > 0) {
      this.shield = 0;
      this.invuln = 800;
      flash = 0.35; flashColor = '0, 243, 255';
      shake = Math.max(shake, 8);
      audio.damage();
      for (let i = 0; i < 24; i++) {
        const a = (i / 24) * Math.PI * 2;
        particles.push(new Particle(this.x, this.y, Math.cos(a) * 3.5, Math.sin(a) * 3.5, '#00f3ff', 35, 3));
      }
      return false;
    }
    lives--;
    this.invuln = 2200;
    flash = 0.7; flashColor = '255, 30, 80';
    shake = Math.max(shake, 18);
    audio.damage();
    audio.explosion(true);
    combo = 0; comboTimer = 0;
    // Esplosione del player
    for (let i = 0; i < 50; i++) {
      const a = Math.random() * Math.PI * 2;
      const s = rand(1, 6);
      particles.push(new Particle(
        this.x, this.y,
        Math.cos(a) * s, Math.sin(a) * s,
        ['#ff00ff', '#00f3ff', '#ffff00', '#ffffff'][randInt(0, 3)],
        rand(35, 70), rand(2, 4.5)
      ));
    }
    if (lives <= 0) gameOver();
    return true;
  }

  applyPowerup(type) {
    if (type === 'triple') {
      this.weapon = 'triple';
      this.weaponTime = 10000; this.weaponDuration = 10000;
    } else if (type === 'double') {
      this.weapon = 'double';
      this.weaponTime = 12000; this.weaponDuration = 12000;
    } else if (type === 'rapid') {
      this.weapon = 'rapid';
      this.fireRate = 95;
      this.weaponTime = 10000; this.weaponDuration = 10000;
    } else if (type === 'shield') {
      this.shield = 999999;
    } else if (type === 'life') {
      lives = Math.min(5, lives + 1);
    }
    audio.powerup();
    floaters.push(new Floater(this.x, this.y - 30, type.toUpperCase(), '#ffff00', 50, 14));
  }

  draw() {
    if (this.invuln > 0 && Math.floor(this.invuln / 90) % 2 === 0) return;
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.thrust * 0.18);

    // Scia motore posteriore
    ctx.shadowBlur = 15;
    ctx.shadowColor = '#00ff66';
    ctx.fillStyle = 'rgba(0, 255, 102, 0.6)';
    ctx.beginPath();
    ctx.moveTo(-6, this.h / 2 - 2);
    ctx.lineTo(0, this.h / 2 + 8 + Math.sin(Date.now() / 50) * 3);
    ctx.lineTo(6, this.h / 2 - 2);
    ctx.closePath();
    ctx.fill();

    // Corpo astronave
    ctx.shadowBlur = 18;
    ctx.shadowColor = '#00f3ff';
    ctx.fillStyle = '#00f3ff';
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(0, -this.h / 2);
    ctx.lineTo(this.w / 2, this.h / 2);
    ctx.lineTo(this.w / 3, this.h / 3);
    ctx.lineTo(-this.w / 3, this.h / 3);
    ctx.lineTo(-this.w / 2, this.h / 2);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    // Cockpit
    ctx.shadowBlur = 10;
    ctx.shadowColor = '#ff00ff';
    ctx.fillStyle = '#ff00ff';
    ctx.beginPath();
    ctx.ellipse(0, -2, 4, 9, 0, 0, Math.PI * 2);
    ctx.fill();

    // Wing tips
    ctx.shadowColor = '#00ff66';
    ctx.fillStyle = '#00ff66';
    ctx.fillRect(this.w / 2 - 1, this.h / 2 - 4, 4, 5);
    ctx.fillRect(-this.w / 2 - 3, this.h / 2 - 4, 4, 5);

    // Scudo
    if (this.shield > 0) {
      ctx.shadowBlur = 18;
      ctx.shadowColor = '#00f3ff';
      const pulse = 0.5 + Math.sin(Date.now() / 120) * 0.3;
      ctx.strokeStyle = `rgba(0, 243, 255, ${pulse + 0.3})`;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(0, 0, 26, 0, Math.PI * 2);
      ctx.stroke();
      ctx.strokeStyle = `rgba(0, 243, 255, ${pulse * 0.4})`;
      ctx.lineWidth = 6;
      ctx.beginPath();
      ctx.arc(0, 0, 26, 0, Math.PI * 2);
      ctx.stroke();
    }

    ctx.restore();
    ctx.shadowBlur = 0;
  }

  getBounds() {
    return { x: this.x - this.w / 3, y: this.y - this.h / 3, w: this.w * 2 / 3, h: this.h * 2 / 3 };
  }
}

// ============================================================
// BULLET
// ============================================================
class Bullet {
  constructor(x, y, vx, vy, color) {
    this.x = x; this.y = y; this.vx = vx; this.vy = vy;
    this.color = color;
    this.w = 4; this.h = 16;
    this.dead = false;
  }
  update(dt) {
    this.x += this.vx * dt * 60;
    this.y += this.vy * dt * 60;
    if (this.y < -20 || this.y > H + 20 || this.x < -20 || this.x > W + 20) this.dead = true;
  }
  draw() {
    ctx.save();
    ctx.shadowBlur = 14;
    ctx.shadowColor = this.color;
    ctx.fillStyle = this.color;
    ctx.fillRect(this.x - 2, this.y - 8, 4, 16);
    ctx.fillStyle = '#ffffff';
    ctx.shadowBlur = 6;
    ctx.fillRect(this.x - 1, this.y - 6, 2, 12);
    ctx.restore();
  }
  getBounds() { return { x: this.x - 2, y: this.y - 8, w: 4, h: 16 }; }
}

// ============================================================
// ENEMY (4 tipi)
// ============================================================
class Enemy {
  constructor(type, x) {
    this.type = type;
    this.x = x; this.y = -40;
    this.t = 0; this.dead = false;
    this.startX = x;
    if (type === 'basic') {
      this.w = 28; this.h = 26; this.hp = 1; this.speed = 2.2;
      this.points = 100; this.color = '#ff00ff';
    } else if (type === 'zigzag') {
      this.w = 30; this.h = 28; this.hp = 2; this.speed = 2.6;
      this.points = 200; this.color = '#ff3366';
    } else if (type === 'wave') {
      this.w = 38; this.h = 30; this.hp = 3; this.speed = 1.9;
      this.points = 300; this.color = '#ff8800';
    } else if (type === 'tank') {
      this.w = 46; this.h = 38; this.hp = 6; this.speed = 1.1;
      this.points = 600; this.color = '#ff2266';
    }
    this.maxHp = this.hp;
  }

  update(dt) {
    this.t += dt;
    if (this.type === 'basic') {
      this.y += this.speed * dt * 60;
    } else if (this.type === 'zigzag') {
      this.y += this.speed * dt * 60;
      this.x = this.startX + Math.sin(this.t * 4.5) * 90;
    } else if (this.type === 'wave') {
      this.y += this.speed * dt * 60;
      this.x = this.startX + Math.sin(this.t * 2.2) * 130;
    } else if (this.type === 'tank') {
      this.y += this.speed * dt * 60;
      this.x = this.startX + Math.sin(this.t * 1.2) * 30;
    }
    this.x = clamp(this.x, this.w / 2, W - this.w / 2);
    if (this.y > H + 50) this.dead = true;
  }

  hit(dmg = 1) {
    this.hp -= dmg;
    // Spark
    for (let i = 0; i < 3; i++) {
      particles.push(new Particle(this.x, this.y, rand(-2, 2), rand(-2, 2), '#ffffff', 12, 2));
    }
    if (this.hp <= 0) { this.die(); return true; }
    return false;
  }

  die() {
    this.dead = true;
    audio.explosion(this.type === 'tank');
    shake = Math.max(shake, this.type === 'tank' ? 12 : 5);
    const count = this.type === 'tank' ? 35 : 20;
    for (let i = 0; i < count; i++) {
      const a = Math.random() * Math.PI * 2;
      const s = rand(1, 4.5);
      particles.push(new Particle(
        this.x, this.y,
        Math.cos(a) * s, Math.sin(a) * s,
        [this.color, '#ffff00', '#ffffff'][randInt(0, 2)],
        rand(25, 55), rand(2, 4)
      ));
    }
    combo++;
    comboTimer = 2200;
    const mult = Math.max(1, Math.floor(combo / 3) + 1);
    const points = this.points * mult;
    score += points;
    floaters.push(new Floater(this.x, this.y, '+' + points, '#ffff00', 55, 12));
    if (mult > 1) {
      floaters.push(new Floater(this.x, this.y - 18, 'x' + mult, '#ff00ff', 50, 10));
    }

    // Drop powerup
    const dropChance = this.type === 'tank' ? 0.85 : (this.type === 'wave' ? 0.18 : 0.1);
    if (Math.random() < dropChance) {
      const types = ['triple', 'rapid', 'shield', 'double', 'life'];
      const weights = [3, 3, 2, 3, 1];
      const total = weights.reduce((a, b) => a + b, 0);
      let r = Math.random() * total;
      let type = types[0];
      for (let i = 0; i < types.length; i++) {
        r -= weights[i];
        if (r <= 0) { type = types[i]; break; }
      }
      powerups.push(new PowerUp(this.x, this.y, type));
    }

    waveKills++;
    if (waveKills >= waveTarget) nextWave();
  }

  draw() {
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.shadowBlur = 16;
    ctx.shadowColor = this.color;
    ctx.fillStyle = this.color;
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 1.5;

    if (this.type === 'basic') {
      ctx.beginPath();
      ctx.moveTo(0, this.h / 2);
      ctx.lineTo(this.w / 2, -this.h / 2);
      ctx.lineTo(this.w / 4, -this.h / 3);
      ctx.lineTo(-this.w / 4, -this.h / 3);
      ctx.lineTo(-this.w / 2, -this.h / 2);
      ctx.closePath();
      ctx.fill(); ctx.stroke();
      ctx.shadowBlur = 6;
      ctx.shadowColor = '#ffff00';
      ctx.fillStyle = '#ffff00';
      ctx.fillRect(-3, -5, 6, 6);
    } else if (this.type === 'zigzag') {
      ctx.beginPath();
      ctx.moveTo(0, -this.h / 2);
      ctx.lineTo(this.w / 2, 0);
      ctx.lineTo(0, this.h / 2);
      ctx.lineTo(-this.w / 2, 0);
      ctx.closePath();
      ctx.fill(); ctx.stroke();
      ctx.shadowBlur = 5;
      ctx.shadowColor = '#ffffff';
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(-2, -2, 4, 4);
    } else if (this.type === 'wave') {
      ctx.beginPath();
      for (let i = 0; i < 6; i++) {
        const a = (i / 6) * Math.PI * 2 + Math.PI / 2;
        const px = Math.cos(a) * this.w / 2;
        const py = Math.sin(a) * this.h / 2;
        if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
      }
      ctx.closePath();
      ctx.fill(); ctx.stroke();
      ctx.shadowBlur = 8;
      ctx.shadowColor = '#ffff00';
      ctx.fillStyle = '#ffff00';
      ctx.beginPath();
      ctx.arc(0, 0, 5, 0, Math.PI * 2);
      ctx.fill();
    } else if (this.type === 'tank') {
      ctx.beginPath();
      ctx.moveTo(-this.w / 2, -this.h / 2);
      ctx.lineTo(this.w / 2, -this.h / 2);
      ctx.lineTo(this.w / 2 - 6, this.h / 2);
      ctx.lineTo(-this.w / 2 + 6, this.h / 2);
      ctx.closePath();
      ctx.fill(); ctx.stroke();
      ctx.fillStyle = '#ffff00';
      ctx.shadowColor = '#ffff00';
      ctx.fillRect(-this.w / 2 + 3, this.h / 2 - 6, 5, 9);
      ctx.fillRect(this.w / 2 - 8, this.h / 2 - 6, 5, 9);
      ctx.shadowBlur = 8;
      ctx.shadowColor = '#ffffff';
      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      ctx.arc(0, 0, 6, 0, Math.PI * 2);
      ctx.fill();
    }

    // HP bar
    if (this.hp < this.maxHp) {
      const ratio = this.hp / this.maxHp;
      ctx.shadowBlur = 0;
      ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
      ctx.fillRect(-14, this.h / 2 + 5, 28, 3);
      ctx.fillStyle = ratio > 0.5 ? '#00ff66' : (ratio > 0.25 ? '#ffff00' : '#ff0066');
      ctx.fillRect(-14, this.h / 2 + 5, 28 * ratio, 3);
    }
    ctx.restore();
  }

  getBounds() { return { x: this.x - this.w / 2, y: this.y - this.h / 2, w: this.w, h: this.h }; }
}

// ============================================================
// ASTEROIDE
// ============================================================
class Asteroid {
  constructor(opts = {}) {
    this.size = opts.size || rand(22, 38);
    this.x = opts.x !== undefined ? opts.x : rand(this.size, W - this.size);
    this.y = opts.y !== undefined ? opts.y : -this.size;
    this.vx = opts.vx !== undefined ? opts.vx : rand(-1, 1);
    this.vy = opts.vy !== undefined ? opts.vy : rand(1.5, 3.2);
    this.rot = 0;
    this.rotSpeed = rand(-0.04, 0.04);
    this.hp = opts.hp || Math.ceil(this.size / 14);
    this.maxHp = this.hp;
    this.dead = false;
    this.points = Math.floor(50 + (40 - this.size) * 5);
    this.shape = [];
    const verts = randInt(7, 10);
    for (let i = 0; i < verts; i++) {
      const a = (i / verts) * Math.PI * 2;
      const r = this.size * rand(0.7, 1);
      this.shape.push({ x: Math.cos(a) * r, y: Math.sin(a) * r });
    }
  }

  update(dt) {
    this.x += this.vx * dt * 60;
    this.y += this.vy * dt * 60;
    this.rot += this.rotSpeed * dt * 60;
    if (this.y > H + this.size) this.dead = true;
    if (this.x < -this.size) this.x = W + this.size;
    if (this.x > W + this.size) this.x = -this.size;
  }

  hit(dmg = 1) {
    this.hp -= dmg;
    for (let i = 0; i < 3; i++) {
      particles.push(new Particle(this.x, this.y, rand(-2, 2), rand(-2, 2), '#ffaa00', 12, 2));
    }
    if (this.hp <= 0) { this.die(); return true; }
    return false;
  }

  die() {
    this.dead = true;
    audio.explosion();
    shake = Math.max(shake, 5);
    for (let i = 0; i < 22; i++) {
      const a = Math.random() * Math.PI * 2;
      const s = rand(1, 3.5);
      particles.push(new Particle(
        this.x, this.y,
        Math.cos(a) * s, Math.sin(a) * s,
        ['#ff6b00', '#ffaa00', '#ffffff'][randInt(0, 2)],
        rand(25, 50), rand(2, 4)
      ));
    }
    combo++;
    comboTimer = 2200;
    const mult = Math.max(1, Math.floor(combo / 3) + 1);
    const points = this.points * mult;
    score += points;
    floaters.push(new Floater(this.x, this.y, '+' + points, '#ffaa00', 50, 11));
    if (mult > 1) {
      floaters.push(new Floater(this.x, this.y - 18, 'x' + mult, '#ff00ff', 45, 10));
    }

    if (this.size > 28) {
      for (let i = 0; i < 2; i++) {
        asteroids.push(new Asteroid({
          x: this.x, y: this.y,
          size: this.size * 0.55,
          vx: rand(-2.2, 2.2),
          vy: rand(1, 2.5),
          hp: 1
        }));
      }
    }

    waveKills++;
    if (waveKills >= waveTarget) nextWave();
  }

  draw() {
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rot);
    ctx.shadowBlur = 14;
    ctx.shadowColor = '#ff6b00';
    ctx.fillStyle = 'rgba(255, 107, 0, 0.25)';
    ctx.strokeStyle = '#ff6b00';
    ctx.lineWidth = 2;
    ctx.beginPath();
    this.shape.forEach((p, i) => {
      if (i === 0) ctx.moveTo(p.x, p.y);
      else ctx.lineTo(p.x, p.y);
    });
    ctx.closePath();
    ctx.fill(); ctx.stroke();
    ctx.shadowBlur = 4;
    ctx.strokeStyle = 'rgba(255, 200, 100, 0.5)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    for (let i = 0; i < this.shape.length; i += 2) {
      const p = this.shape[i];
      ctx.moveTo(0, 0);
      ctx.lineTo(p.x * 0.6, p.y * 0.6);
    }
    ctx.stroke();
    ctx.restore();
  }

  getBounds() { return { x: this.x - this.size * 0.7, y: this.y - this.size * 0.7, w: this.size * 1.4, h: this.size * 1.4 }; }
}

// ============================================================
// POWER-UP
// ============================================================
class PowerUp {
  constructor(x, y, type) {
    this.x = x; this.y = y;
    this.type = type;
    this.vy = 1.8;
    this.rot = 0;
    this.dead = false;
    this.t = 0;
  }
  get color() {
    return { triple: '#00f3ff', double: '#00ff66', rapid: '#ffff00', shield: '#ff00ff', life: '#ff3366' }[this.type];
  }
  get label() {
    return { triple: '3X', double: '2X', rapid: 'R', shield: 'S', life: '+1' }[this.type];
  }
  update(dt) {
    this.y += this.vy * dt * 60;
    this.t += dt;
    this.rot += dt * 3;
    if (this.y > H + 30) this.dead = true;
  }
  draw() {
    ctx.save();
    ctx.translate(this.x, this.y);
    const c = this.color;
    const pulse = 0.7 + Math.sin(this.t * 5) * 0.3;
    ctx.shadowBlur = 20;
    ctx.shadowColor = c;
    ctx.strokeStyle = c;
    ctx.lineWidth = 2;
    ctx.fillStyle = `rgba(${hexToRgb(c)}, ${pulse * 0.3})`;
    ctx.rotate(this.rot);
    ctx.beginPath();
    for (let i = 0; i < 6; i++) {
      const a = (i / 6) * Math.PI * 2;
      const x = Math.cos(a) * 12;
      const y = Math.sin(a) * 12;
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.fill(); ctx.stroke();
    ctx.rotate(-this.rot);
    ctx.shadowBlur = 8;
    ctx.fillStyle = c;
    ctx.font = 'bold 9px "Press Start 2P", monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(this.label, 0, 0);
    ctx.restore();
  }
  getBounds() { return { x: this.x - 12, y: this.y - 12, w: 24, h: 24 }; }
}

// ============================================================
// PARTICLE
// ============================================================
class Particle {
  constructor(x, y, vx, vy, color, life, size) {
    this.x = x; this.y = y;
    this.vx = vx; this.vy = vy;
    this.color = color;
    this.life = life; this.maxLife = life;
    this.size = size;
    this.dead = false;
  }
  update(dt) {
    this.x += this.vx * dt * 60;
    this.y += this.vy * dt * 60;
    this.vx *= 0.96;
    this.vy *= 0.96;
    this.life -= dt * 60;
    if (this.life <= 0) this.dead = true;
  }
  draw() {
    const a = this.life / this.maxLife;
    ctx.globalAlpha = clamp(a, 0, 1);
    ctx.shadowBlur = 8;
    ctx.shadowColor = this.color;
    ctx.fillStyle = this.color;
    const s = this.size * a;
    ctx.fillRect(this.x - s / 2, this.y - s / 2, s, s);
    ctx.globalAlpha = 1;
  }
}

// ============================================================
// FLOATER (testo fluttuante)
// ============================================================
class Floater {
  constructor(x, y, text, color, life, size = 12) {
    this.x = x; this.y = y;
    this.text = text;
    this.color = color;
    this.life = life; this.maxLife = life;
    this.size = size;
    this.dead = false;
  }
  update(dt) {
    this.y -= 1.2 * dt * 60;
    this.life -= dt * 60;
    if (this.life <= 0) this.dead = true;
  }
  draw() {
    const a = clamp(this.life / this.maxLife, 0, 1);
    ctx.save();
    ctx.globalAlpha = a;
    ctx.shadowBlur = 8;
    ctx.shadowColor = this.color;
    ctx.fillStyle = this.color;
    ctx.font = `bold ${this.size}px "Orbitron", sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(this.text, this.x, this.y);
    ctx.restore();
  }
}

// ============================================================
// SPAWN & WAVE
// ============================================================
function spawnEnemy() {
  const pool = [];
  if (wave <= 1) {
    pool.push('asteroid', 'asteroid', 'asteroid', 'asteroid', 'basic');
  } else if (wave <= 2) {
    pool.push('asteroid', 'asteroid', 'asteroid', 'basic', 'basic');
  } else if (wave <= 3) {
    pool.push('asteroid', 'asteroid', 'basic', 'basic', 'zigzag');
  } else if (wave <= 4) {
    pool.push('asteroid', 'basic', 'basic', 'zigzag', 'zigzag');
  } else if (wave <= 5) {
    pool.push('asteroid', 'basic', 'zigzag', 'zigzag', 'wave');
  } else if (wave <= 6) {
    pool.push('basic', 'zigzag', 'wave', 'wave', 'asteroid');
  } else if (wave <= 7) {
    pool.push('basic', 'zigzag', 'wave', 'wave', 'tank');
  } else if (wave <= 9) {
    pool.push('zigzag', 'wave', 'wave', 'tank', 'tank');
  } else {
    pool.push('zigzag', 'wave', 'wave', 'tank', 'tank', 'basic', 'tank');
  }
  const type = pool[randInt(0, pool.length - 1)];
  if (type === 'asteroid') {
    asteroids.push(new Asteroid());
  } else {
    enemies.push(new Enemy(type, rand(50, W - 50)));
  }
}

function nextWave() {
  wave++;
  waveKills = 0;
  waveTarget = 8 + wave * 2;
  spawnRate = Math.max(380, 1500 - wave * 90);
  audio.waveStart();
  announcement = { text: 'WAVE ' + wave, color: '#ff00ff' };
  announcementTime = 2200;
}

// ============================================================
// GAME FLOW
// ============================================================
function startGame() {
  state = STATES.PLAYING;
  player = new Player();
  bullets = []; enemies = []; asteroids = [];
  powerups = []; particles = []; floaters = [];
  score = 0; lives = 3; wave = 1;
  waveKills = 0; waveTarget = 8;
  spawnTimer = 0; spawnRate = 1500;
  pendingSpawns = 0; spawnDelay = 0;
  combo = 0; comboTimer = 0;
  shake = 0; flash = 0;
  gameOverPending = false; gameOverTimer = 0;
  announcement = { text: 'WAVE 1', color: '#ff00ff' };
  announcementTime = 2000;

  document.getElementById('menuScreen').classList.add('hidden');
  document.getElementById('gameOverScreen').classList.add('hidden');
  document.getElementById('pauseScreen').classList.add('hidden');
  document.getElementById('hud').style.display = 'block';

  audio.init();
  audio.resume();
  audio.waveStart();
}

function gameOver() {
  if (gameOverPending) return;
  gameOverPending = true;
  gameOverTimer = 1500;
  const isNewRecord = score > highScore;
  if (isNewRecord) {
    highScore = score;
    localStorage.setItem('neonStrike_highScore', highScore.toString());
  }
  setTimeout(() => {
    if (state !== STATES.GAMEOVER && gameOverPending) {
      showGameOverScreen(isNewRecord);
    }
  }, 1500);
}

function showGameOverScreen(isNewRecord) {
  state = STATES.GAMEOVER;
  document.getElementById('finalScore').textContent = score.toLocaleString();
  document.getElementById('recordScore').textContent = highScore.toLocaleString();
  document.getElementById('finalWave').textContent = wave;
  document.getElementById('newRecordRow').style.display = isNewRecord ? 'flex' : 'none';
  document.getElementById('gameOverScreen').classList.remove('hidden');
  document.getElementById('hud').style.display = 'none';
  document.getElementById('menuHiScore').textContent = highScore.toLocaleString();
}

function togglePause() {
  if (state === STATES.PLAYING) {
    state = STATES.PAUSED;
    document.getElementById('pauseScreen').classList.remove('hidden');
  } else if (state === STATES.PAUSED) {
    state = STATES.PLAYING;
    document.getElementById('pauseScreen').classList.add('hidden');
  }
}

// ============================================================
// UPDATE
// ============================================================
function update(dt, t) {
  // Background sempre aggiornato
  updateStars(dt);
  updateGrid(dt);

  if (state === STATES.PLAYING && !gameOverPending) {
    player.update(dt, t);

    // Spawn
    spawnTimer += dt * 1000;
    if (spawnTimer > spawnRate) {
      spawnTimer = 0;
      spawnEnemy();
      if (wave > 3 && Math.random() < 0.35) {
        pendingSpawns = randInt(1, 2);
        spawnDelay = 250;
      }
    }
    if (pendingSpawns > 0) {
      spawnDelay -= dt * 1000;
      if (spawnDelay <= 0) {
        spawnEnemy();
        pendingSpawns--;
        spawnDelay = 250;
      }
    }

    // Entities
    for (const b of bullets) b.update(dt);
    for (const e of enemies) e.update(dt);
    for (const a of asteroids) a.update(dt);
    for (const p of powerups) p.update(dt);

    // Collisions: bullets vs enemies/asteroids
    for (const b of bullets) {
      if (b.dead) continue;
      for (const e of enemies) {
        if (e.dead) continue;
        if (aabb(b.getBounds(), e.getBounds())) {
          b.dead = true;
          e.hit(1);
          break;
        }
      }
      if (b.dead) continue;
      for (const a of asteroids) {
        if (a.dead) continue;
        if (aabb(b.getBounds(), a.getBounds())) {
          b.dead = true;
          a.hit(1);
          break;
        }
      }
    }

    // Player collisions
    if (player.invuln <= 0) {
      const pb = player.getBounds();
      for (const e of enemies) {
        if (e.dead) continue;
        if (aabb(pb, e.getBounds())) {
          if (player.takeDamage()) { e.die(); break; }
        }
      }
      if (lives > 0) {
        for (const a of asteroids) {
          if (a.dead) continue;
          if (aabb(pb, a.getBounds())) {
            if (player.takeDamage()) { a.die(); break; }
          }
        }
      }
    }
    // Powerup pickup (sempre, anche se invuln)
    const pb2 = player.getBounds();
    for (const p of powerups) {
      if (p.dead) continue;
      if (aabb(pb2, p.getBounds())) {
        p.dead = true;
        player.applyPowerup(p.type);
      }
    }

    // Combo timer
    if (comboTimer > 0) {
      comboTimer -= dt * 1000;
      if (comboTimer <= 0) combo = 0;
    }
  }

  // Update effects sempre
  for (const p of particles) p.update(dt);
  for (const f of floaters) f.update(dt);

  // Cleanup
  bullets = bullets.filter(b => !b.dead);
  enemies = enemies.filter(e => !e.dead);
  asteroids = asteroids.filter(a => !a.dead);
  powerups = powerups.filter(p => !p.dead);
  particles = particles.filter(p => !p.dead);
  floaters = floaters.filter(f => !f.dead);

  // Effetti
  if (shake > 0) shake = Math.max(0, shake - dt * 60);
  if (flash > 0) flash = Math.max(0, flash - dt * 2.5);

  // Announcement
  if (announcementTime > 0) {
    announcementTime -= dt * 1000;
    if (announcementTime <= 0) announcement = null;
  }

  // Game over delay
  if (gameOverPending) {
    gameOverTimer -= dt * 1000;
    if (gameOverTimer <= 0) {
      gameOverPending = false;
      showGameOverScreen(score > highScore || score === highScore ? score === parseInt(localStorage.getItem('neonStrike_highScore') || '0') : false);
      //Più semplice: controlla se score >= highScore saved (già salvato in gameOver)
      const saved = parseInt(localStorage.getItem('neonStrike_highScore') || '0');
      showGameOverScreen(score === saved && score > 0);
    }
  }
}

// ============================================================
// DRAW
// ============================================================
function draw() {
  // Sfondo base
  ctx.fillStyle = '#050515';
  ctx.fillRect(0, 0, W, H);

  ctx.save();
  if (shake > 0) {
    ctx.translate(rand(-shake, shake), rand(-shake, shake));
  }

  drawBackground();
  drawStars();

  // Entities
  for (const a of asteroids) a.draw();
  for (const e of enemies) e.draw();
  for (const p of powerups) p.draw();
  for (const b of bullets) b.draw();
  for (const p of particles) p.draw();

  if (player && state === STATES.PLAYING && !gameOverPending) player.draw();
  if (player && state === STATES.PAUSED) player.draw();

  // Floaters
  for (const f of floaters) f.draw();

  // Wave announcement
  if (announcement) {
    ctx.save();
    const alpha = clamp(announcementTime / 500, 0, 1) * clamp((2200 - announcementTime) / 300, 0, 1);
    ctx.globalAlpha = alpha;
    ctx.shadowBlur = 24;
    ctx.shadowColor = announcement.color;
    ctx.fillStyle = announcement.color;
    ctx.font = 'bold 38px "Press Start 2P", monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(announcement.text, W / 2, H / 2);
    ctx.restore();
  }

  ctx.restore();

  // Flash
  if (flash > 0) {
    ctx.fillStyle = `rgba(${flashColor}, ${flash * 0.55})`;
    ctx.fillRect(0, 0, W, H);
  }

  // Vignette
  const vg = ctx.createRadialGradient(W / 2, H / 2, H * 0.4, W / 2, H / 2, H * 0.75);
  vg.addColorStop(0, 'rgba(0, 0, 0, 0)');
  vg.addColorStop(1, 'rgba(0, 0, 0, 0.55)');
  ctx.fillStyle = vg;
  ctx.fillRect(0, 0, W, H);

  if (state === STATES.PLAYING || state === STATES.PAUSED) {
    updateHUD();
  }
}

// ============================================================
// HUD
// ============================================================
function updateHUD() {
  document.getElementById('scoreVal').textContent = score.toLocaleString();
  document.getElementById('hiScoreVal').textContent = Math.max(highScore, score).toLocaleString();
  document.getElementById('waveVal').textContent = wave;

  const livesDisplay = document.getElementById('livesDisplay');
  if (livesDisplay.children.length !== lives) {
    livesDisplay.innerHTML = '';
    for (let i = 0; i < lives; i++) {
      const d = document.createElement('div');
      d.className = 'life-icon';
      livesDisplay.appendChild(d);
    }
  }

  const comboEl = document.getElementById('combo');
  if (combo >= 3) {
    comboEl.classList.add('active');
    document.getElementById('comboVal').textContent = 'x' + (Math.floor(combo / 3) + 1);
  } else {
    comboEl.classList.remove('active');
  }

  const wi = document.getElementById('weaponIndicator');
  if (player && player.weapon !== 'single' && player.weaponTime > 0) {
    wi.classList.add('active');
    const names = { triple: 'TRIPLE', double: 'DOUBLE', rapid: 'RAPID' };
    document.getElementById('weaponName').textContent = names[player.weapon] || 'SINGLE';
    const ratio = player.weaponTime / player.weaponDuration;
    document.getElementById('weaponBarFill').style.width = (ratio * 100) + '%';
  } else {
    wi.classList.remove('active');
  }
}

// ============================================================
// GAME LOOP
// ============================================================
function gameLoop(t) {
  const dt = Math.min(0.05, (t - lastTime) / 1000);
  lastTime = t;
  update(dt, t);
  draw();
  requestAnimationFrame(gameLoop);
}

// ============================================================
// INPUT
// ============================================================
window.addEventListener('keydown', (e) => {
  keys[e.key] = true;
  if (e.key === 'p' || e.key === 'P' || e.key === 'Escape') {
    if (state === STATES.PLAYING || state === STATES.PAUSED) {
      togglePause();
      e.preventDefault();
    }
  }
  if (['ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown', ' '].includes(e.key)) e.preventDefault();
});
window.addEventListener('keyup', (e) => { keys[e.key] = false; });

document.getElementById('playBtn').addEventListener('click', startGame);
document.getElementById('replayBtn').addEventListener('click', startGame);

// Init
initStars();
document.getElementById('menuHiScore').textContent = highScore.toLocaleString();
lastTime = performance.now();
requestAnimationFrame(gameLoop);
</script>
