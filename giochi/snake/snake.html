<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:'Courier New',monospace;overflow:hidden;flex-direction:column}
.back{position:fixed;top:12px;left:12px;z-index:99;background:none;border:2px solid #39ff14;color:#39ff14;padding:6px 14px;border-radius:8px;cursor:pointer;font-family:'Courier New',monospace;font-size:14px;font-weight:700;text-decoration:none;transition:all .3s;display:flex;align-items:center;gap:6px}
.back:hover{background:#39ff14;color:#0a0a1a;box-shadow:0 0 20px rgba(57,255,20,.4)}
canvas{display:block;border:2px solid #39ff14;box-shadow:0 0 30px rgba(57,255,20,.25),inset 0 0 30px rgba(57,255,20,.05);background:#0d1a0d;border-radius:4px}
#hud{display:flex;justify-content:center;gap:60px;margin-bottom:16px;color:#39ff14;font-size:18px;font-weight:700;text-shadow:0 0 10px rgba(57,255,20,.4);width:100%;max-width:600px}
#hud span{letter-spacing:2px}
#hud .val{color:#fff}
#msg{position:absolute;color:#fff;font-family:'Orbitron',sans-serif;font-size:24px;letter-spacing:3px;text-shadow:0 0 20px rgba(57,255,20,.5);pointer-events:none;opacity:0;transition:opacity .4s}
#msg.show{opacity:1}
</style>
</head>
<body>
<a class="back" href="../../index.html">&#8592; Indietro</a>
<div id="hud"><span>PUNTI <span class="val" id="score">0</span></span><span>LUNGHEZZA <span class="val" id="len">3</span></span></div>
<canvas id="c"></canvas>
<div id="msg"></div>
<script>
(function(){var c=document.getElementById('c'),ctx=c.getContext('2d'),W=600,H=600,gs=20,cols=W/gs,rows=H/gs,dir={x:1,y:0},nextDir={x:1,y:0},snake=[],food={},score=0,run=!1,gameOver=!1,ani,msgEl=document.getElementById('msg'),scoreEl=document.getElementById('score'),lenEl=document.getElementById('len');function randFood(){var free;do{free={x:0|Math.random()*cols,y:0|Math.random()*rows}}while(snake.some(function(s){return s.x===free.x&&s.y===free.y}));food=free}function init(){snake=[];for(var i=2;i>=0;i--)snake.push({x:2+i,y:0});dir={x:1,y:0};nextDir={x:1,y:0};score=0;gameOver=!1;scoreEl.textContent='0';lenEl.textContent='3';randFood()}function msg(t,d){msgEl.textContent=t;msgEl.classList.add('show');clearTimeout(msg._t);msg._t=setTimeout(function(){msgEl.classList.remove('show')},d||1500)}function update(){if(!run||gameOver)return;dir={x:nextDir.x,y:nextDir.y};var head={x:snake[0].x+dir.x,y:snake[0].y+dir.y};if(head.x<0||head.x>=cols||head.y<0||head.y>=rows){gameOver=!0;msg('GAME OVER',2e3);setTimeout(function(){init();run=!1;msg('CLICK per iniziare!',3e3)},2500);return}for(var i=0;i<snake.length;i++)if(snake[i].x===head.x&&snake[i].y===head.y){gameOver=!0;msg('GAME OVER',2e3);setTimeout(function(){init();run=!1;msg('CLICK per iniziare!',3e3)},2500);return}snake.unshift(head);if(head.x===food.x&&head.y===food.y){score+=10;scoreEl.textContent=score;lenEl.textContent=snake.length;randFood()}else snake.pop()}function draw(){ctx.clearRect(0,0,W,H);ctx.fillStyle='rgba(57,255,20,.02)';ctx.fillRect(0,0,W,H);ctx.shadowColor='#39ff14';ctx.shadowBlur=8;snake.forEach(function(s,i){if(i===0){ctx.fillStyle='#39ff14';ctx.shadowBlur=20}else{ctx.fillStyle='#1a5c1a';ctx.shadowBlur=6}ctx.fillRect(s.x*gs+1,s.y*gs+1,gs-2,gs-2)});ctx.shadowBlur=20;ctx.fillStyle='#ff3355';ctx.shadowColor='#ff3355';ctx.beginPath();ctx.arc(food.x*gs+gs/2,food.y*gs+gs/2,gs/2-2,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0}function loop(){update();draw();setTimeout(function(){ani=requestAnimationFrame(loop)},130)}document.addEventListener('keydown',function(e){var k=e.key;if(k==='ArrowUp'&&dir.y!==1){nextDir={x:0,y:-1};e.preventDefault()}else if(k==='ArrowDown'&&dir.y!==-1){nextDir={x:0,y:1};e.preventDefault()}else if(k==='ArrowLeft'&&dir.x!==1){nextDir={x:-1,y:0};e.preventDefault()}else if(k==='ArrowRight'&&dir.x!==-1){nextDir={x:1,y:0};e.preventDefault()}});document.addEventListener('click',function(){if(gameOver)return;if(!run){run=!0;msgEl.classList.remove('show')}});init();msg('CLICK per iniziare!',3e3);loop()})();
</script>
</body>
</html>
